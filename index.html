<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricelist Aplikasi Premium - Steotype</title>
    
    <meta property="og:title" content="Pricelist Aplikasi Premium - Steotype">
    <meta property="og:description" content="Daftar harga terbaru aplikasi premium untuk Steotype. Cepat dan mudah diakses.">
    <meta property="og:image" content="https://raw.githubusercontent.com/steotype/steotype/cb289f8de4a33c7941713f70fca80a11d3fec170/LP.jpg">
    <meta property="og:url" content="https://steotype.pages.dev">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Pricelist Aplikasi Premium - Steotype">
    <meta name="twitter:description" content="Daftar harga terbaru aplikasi premium untuk Steotype. Cepat dan mudah diakses.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/steotype/steotype/cb289f8de4a33c7941713f70fca80a11d3fec170/LP.jpg">
    <meta name="twitter:url" content="https://steotype.pages.dev">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Pengaturan Dasar */
        body { font-family: 'Inter', sans-serif; background-color: #0d0d12; color: #ffffff; margin: 0; padding: 0; box-sizing: border-box; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 3rem 1.5rem; }

        /* --- HEADER COMPACT --- */
        .compact-header {
            text-align: center; padding: 2rem 0 1.5rem 0; margin-bottom: 2rem;
            border-bottom: 1px solid #1a1a24; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; 
        }

        .compact-header h1 {
            font-size: min(1.8rem, 6vw); 
            white-space: nowrap; 
            font-weight: 700; margin: 0; color: #ffffff; letter-spacing: -0.5px;
        }

        .logo-text {
            font-size: 1.5rem; font-weight: 700; margin: 0 0 0.8rem 0;
            background: linear-gradient(90deg, #ffffff, #8b8b99);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .search-box { position: relative; width: 100%; max-width: 400px; }
        
        .search-input {
            width: 100%; background-color: #15151e; border: 1px solid #2a2a35; color: #ffffff;
            padding: 12px 16px 12px 40px; border-radius: 20px; font-size: 0.95rem; font-family: 'Inter', sans-serif;
            transition: all 0.3s ease; box-sizing: border-box;
        }
        
        .search-input:focus { outline: none; border-color: #4a4a5a; box-shadow: 0 0 12px rgba(255,255,255,0.05); }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #8b8b99; font-size: 1rem; }

        /* --- GRID KARTU --- */
        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        
        /* Status Text (Loading/Error) */
        #statusMessage { text-align: center; padding: 2rem; color: #8b8b99; font-size: 1rem; }
        .no-results { display: none; text-align: center; grid-column: 1 / -1; padding: 2rem; color: #8b8b99; }

        /* Desain Kartu */
        .card {
            background: #181820; border: 1px solid #2a2a35; border-radius: 12px; padding: 1.8rem 1.5rem;
            transition: all 0.2s ease; display: flex; flex-direction: column; justify-content: space-between;
        }
        
        .card:hover { transform: translateY(-4px); border-color: #4a4a5a; }
        .card-header { text-align: center; margin-bottom: 1.2rem; }
        
        /* Judul Aplikasi (Seragam Putih) */
        .brand-name { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.2rem; color: #ffffff; }

        .package-group { background: #21212c; border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem; }
        
        .package-title {
            font-weight: 600; font-size: 0.9rem; color: #ffffff; margin-bottom: 0.6rem;
            border-bottom: 1px solid #363645; padding-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center;
        }

        .package-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .package-item:last-child { margin-bottom: 0; }
        .duration { color: #b4b4c0; }
        .cost { font-weight: 700; color: #ffffff; }

        .features { list-style: none; padding: 0; margin: 1.2rem 0; text-align: left; }
        .features li { margin-bottom: 0.5rem; color: #8b8b99; font-size: 0.85rem; display: flex; align-items: center; }
        .features li::before { content: "✓"; color: #ffffff; font-weight: bold; margin-right: 6px; }

        /* Tombol Beli (Seragam) */
        .btn {
            display: block; width: 100%; padding: 12px 0; border-radius: 8px; text-decoration: none;
            font-weight: 600; font-size: 0.95rem; text-align: center; transition: all 0.2s ease; box-sizing: border-box;
            background-color: #ffffff; color: #0d0d12; /* Warna tombol putih elegan */
        }
        
        .btn:hover { opacity: 0.85; transform: scale(0.98); }

        .footer { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #2a2a35; color: #666; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="container">
        <header class="compact-header">
            <h1>Pricelist Aplikasi Premium</h1>
            <div class="logo-text">SteoType</div>
            
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Cari aplikasi...">
            </div>
        </header>

        <div id="statusMessage">Memuat data harga dari CSV...</div>
        
        <div class="pricing-grid" id="pricingGrid">
            <div id="noResults" class="no-results">Aplikasi tidak ditemukan.</div>
        </div>

        <div class="footer">
            &copy; 2026 SteoType. Harga dapat berubah sewaktu-waktu.
        </div>
    </div>

    <script>
        // Sesuaikan dengan nama file CSV Anda
        const csvFileName = 'pricelist.csv';

        async function loadPricelist() {
            try {
                // Tambahkan query parameter waktu agar tidak ter-cache (jika update CSV langsung berubah)
                const response = await fetch(csvFileName + '?t=' + new Date().getTime());
                if (!response.ok) throw new Error("File tidak ditemukan");
                
                const data = await response.text();
                // Memisahkan baris dan membuang baris pertama (header: app_name, category, dll)
                const rows = data.split(/\r?\n/).slice(1); 
                
                const apps = {};

                rows.forEach(row => {
                    if (!row.trim()) return;
                    
                    // Kolom di CSV Anda: app_name, category, duration, price, notes
                    const cols = row.split(',');
                    if (cols.length < 4) return; // Abaikan baris rusak

                    const appName = cols[0].trim();
                    const category = cols[1].trim(); 
                    const duration = cols[2].trim(); 
                    const price = cols[3].trim();    

                    if (!apps[appName]) {
                        apps[appName] = {
                            categories: {}
                        };
                    }

                    if (!apps[appName].categories[category]) {
                        apps[appName].categories[category] = [];
                    }

                    // Masukkan harga ke kategorinya masing-masing
                    apps[appName].categories[category].push({ duration, price });
                });

                renderCards(apps);
                document.getElementById('statusMessage').style.display = 'none';

            } catch (error) {
                document.getElementById('statusMessage').innerText = "Gagal memuat file CSV. Pastikan file " + csvFileName + " berada di folder yang sama.";
            }
        }

        function renderCards(apps) {
            const grid = document.getElementById('pricingGrid');
            const noResults = document.getElementById('noResults');
            
            // Hapus isi grid (kecuali noResults alert)
            grid.innerHTML = '';
            grid.appendChild(noResults);

            for (const [name, info] of Object.entries(apps)) {
                let packageHTML = '';
                
                // Looping category (misal: "SHARING 1P1U", "SEMI PRIVATE")
                for (const [categoryName, items] of Object.entries(info.categories)) {
                    let itemsHTML = '';
                    items.forEach(item => {
                        itemsHTML += `
                            <div class="package-item">
                                <span class="duration">${item.duration}</span>
                                <span class="cost">${item.price}</span>
                            </div>`;
                    });

                    packageHTML += `
                        <div class="package-group">
                            <div class="package-title">${categoryName}</div>
                            ${itemsHTML}
                        </div>`;
                }

                // Buat Elemen Kartu
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-name', name.toLowerCase());
                
                // Format teks untuk Whatsapp URL
                const waText = encodeURIComponent(`Halo, saya tertarik dengan ${name}`);

                card.innerHTML = `
                    <div>
                        <div class="card-header">
                            <div class="brand-name">${name}</div>
                        </div>
                        ${packageHTML}
                        <ul class="features">
                            <li>Legal & Bergaransi Full</li>
                            <li>Bisa perpanjang akun lama</li>
                        </ul>
                    </div>
                    <a href="https://wa.me/6281234567890?text=${waText}" target="_blank" class="btn">Pesan Sekarang</a>
                `;
                grid.appendChild(card);
            }
        }

        // Fitur Pencarian Realtime
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase().trim();
            let hasVisibleCards = false;

            document.querySelectorAll('.card').forEach(card => {
                const appName = card.getAttribute('data-name');
                if (appName.includes(searchTerm)) {
                    card.style.display = 'flex';
                    hasVisibleCards = true;
                } else {
                    card.style.display = 'none';
                }
            });

            const noResults = document.getElementById('noResults');
            if (!hasVisibleCards && searchTerm !== '') {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
            }
        });

        // Jalankan saat web dibuka
        loadPricelist();
    </script>
</body>
</html>
