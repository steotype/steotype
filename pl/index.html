<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricelist Aplikasi Premium - SteoType</title>
    
    <meta property="og:title" content="Pricelist Aplikasi Premium - SteoType">
    <meta property="og:description" content="Daftar harga terbaru aplikasi premium untuk SteoType. Cepat dan mudah diakses.">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in-down { animation: fadeInDown 0.5s ease-out forwards; opacity: 0; transform: translateY(-15px); }
        @keyframes fadeInDown { to { opacity: 1; transform: translateY(0); } }
        /* Loader animasi */
        .loader { border: 3px solid rgba(59, 130, 246, 0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen relative font-sans">

    <main class="px-6 w-full max-w-md md:max-w-3xl lg:max-w-5xl mx-auto pb-12 relative z-0 pt-6"> 
        
        <div class="flex justify-between items-start mb-8 fade-in-down">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-white leading-none">STEO<span class="text-gray-500">TYPE</span></h1>
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-[0.3em] mt-1.5">Premium Apps Catalog</p>
            </div>
            <button onclick="window.location.href='../'" class="text-[10px] bg-gray-800 text-gray-400 px-4 py-2.5 rounded-xl border border-gray-700 uppercase tracking-widest hover:text-white hover:bg-gray-700 transition-all font-bold outline-none flex items-center gap-1.5">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> Home
            </button>
        </div>

        <div class="fade-in-down mb-8 relative overflow-hidden bg-[#151923] border border-gray-700/50 rounded-[2rem] shadow-xl">
            <div class="absolute -top-16 -right-16 w-40 h-40 bg-blue-600/20 blur-3xl rounded-full pointer-events-none"></div>
            <div class="p-6 md:p-8 flex flex-col md:flex-row justify-between items-start md:items-center relative z-10 gap-4">
                <div>
                    <h2 class="text-2xl font-bold mb-1.5 text-white">Daftar Harga Aplikasi</h2>
                    <p class="text-sm text-gray-400 font-medium">Temukan layanan premium yang Anda butuhkan dengan harga terbaik.</p>
                </div>
            </div>
        </div>

        <div class="relative w-full max-w-xl mx-auto mb-10 fade-in-down" style="animation-delay: 0.1s;">
            <input type="text" id="searchInput" class="w-full h-[52px] bg-gray-800/80 border border-gray-700 text-gray-200 text-sm rounded-2xl block pl-12 pr-4 py-3 outline-none focus:border-blue-500 focus:bg-gray-800 transition-colors shadow-lg" placeholder="Cari aplikasi premium (cth: Netflix, Canva)...">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>

        <div id="statusMessage" class="flex flex-col items-center justify-center py-10 space-y-3">
            <div class="loader"></div>
            <p class="text-sm text-gray-400 font-medium tracking-wide">Menarik data dari server...</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="pricingGrid">
            <div id="noResults" class="hidden col-span-full text-center py-12 fade-in-down max-w-md mx-auto w-full">
                <div class="bg-gray-800/50 rounded-2xl p-8 border border-gray-700/50 inline-block w-full text-center">
                    <p class="text-gray-400 text-sm font-medium">Aplikasi tidak ditemukan di katalog kami.</p>
                </div>
            </div>
        </div>

        <div class="text-center mt-12 pt-6 border-t border-gray-800 text-gray-500 text-[11px] font-bold tracking-widest uppercase">
            &copy; 2026 SteoType. Harga dapat berubah sewaktu-waktu.
        </div>
    </main>

    <script>
        // Logika CSV Anda (TIDAK ADA YANG DIHAPUS)
        const csvFileName = 'pricelist.csv';

        function parseCSVLine(row) {
            const cols = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < row.length; i++) {
                const char = row[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    cols.push(current.trim().replace(/^"|"$/g, ''));
                    current = '';
                } else {
                    current += char;
                }
            }
            cols.push(current.trim().replace(/^"|"$/g, ''));
            return cols;
        }

        async function loadPricelist() {
            try {
                const response = await fetch(csvFileName + '?t=' + new Date().getTime());
                if (!response.ok) throw new Error("File tidak ditemukan");
                
                const data = await response.text();
                const rows = data.split(/\r?\n/).slice(1); 
                
                const apps = {};

                rows.forEach(row => {
                    if (!row.trim()) return;
                    
                    const cols = parseCSVLine(row);
                    if (cols.length < 4) return;

                    const appName = cols[0];
                    const category = cols[1]; 
                    const duration = cols[2]; 
                    const price = cols[3];    
                    const notes = cols.length > 4 ? cols[4] : '';

                    if (!apps[appName]) {
                        apps[appName] = {
                            categories: {},
                            appNotes: new Set()
                        };
                    }

                    if (!apps[appName].categories[category]) {
                        apps[appName].categories[category] = [];
                    }

                    apps[appName].categories[category].push({ duration, price });

                    if (notes && notes.toLowerCase() !== 'nan') {
                        apps[appName].appNotes.add(notes);
                    }
                });

                renderCards(apps);
                document.getElementById('statusMessage').style.display = 'none';

            } catch (error) {
                document.getElementById('statusMessage').innerHTML = `<p class="text-red-400 text-sm font-bold bg-red-900/20 p-4 rounded-xl border border-red-900/50">Gagal memuat file CSV. Pastikan file ${csvFileName} berada di folder PL.</p>`;
            }
        }

        function renderCards(apps) {
            const grid = document.getElementById('pricingGrid');
            const noResults = document.getElementById('noResults');
            
            grid.innerHTML = '';
            grid.appendChild(noResults);

            let delay = 0;

            for (const [name, info] of Object.entries(apps)) {
                let packageHTML = '';
                
                // Merakit HTML untuk Kategori dan Harga
                for (const [categoryName, items] of Object.entries(info.categories)) {
                    let itemsHTML = '';
                    items.forEach(item => {
                        itemsHTML += `
                            <div class="flex justify-between items-center text-sm mb-1.5 last:mb-0">
                                <span class="text-gray-400 font-medium">${item.duration}</span>
                                <span class="text-gray-100 font-bold">${item.price}</span>
                            </div>`;
                    });

                    packageHTML += `
                        <div class="bg-gray-800/50 rounded-xl p-3 border border-gray-700/30">
                            <div class="text-[11px] text-blue-400 font-bold uppercase tracking-widest mb-2 border-b border-gray-700/50 pb-1.5">${categoryName}</div>
                            ${itemsHTML}
                        </div>`;
                }

                // Merakit HTML untuk Fitur/Catatan Khusus
                let featuresHTML = '';
                if (info.appNotes.size > 0) {
                    let liItems = '';
                    info.appNotes.forEach(note => {
                        liItems += `
                            <li class="flex items-start gap-2 text-[13px] text-gray-400">
                                <svg class="w-4 h-4 text-green-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                <span>${note}</span>
                            </li>`;
                    });
                    featuresHTML = `<ul class="mt-4 space-y-2 px-1">${liItems}</ul>`;
                }

                // URL WA Canggih Menggunakan Redirect Cloudflare Baru Anda
                const waText = encodeURIComponent(`Halo Admin SteoType, saya tertarik dengan aplikasi ${name}.`);

                const card = document.createElement('div');
                // Styling Card Utama
                card.className = 'card flex flex-col bg-[#151923] border border-gray-700/50 rounded-2xl p-5 shadow-xl transition-all hover:border-blue-500/50 hover:shadow-blue-900/20 hover:shadow-lg fade-in-down';
                card.style.animationDelay = `${delay}s`;
                card.setAttribute('data-name', name.toLowerCase());
                
                card.innerHTML = `
                    <div class="mb-4 pb-4 border-b border-gray-700/50 flex items-center justify-between">
                        <h2 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 uppercase tracking-tight">${name}</h2>
                        <span class="px-2.5 py-1 bg-blue-500/10 text-blue-400 text-[10px] uppercase font-bold rounded border border-blue-500/20">Premium</span>
                    </div>
                    
                    <div class="flex-1 space-y-3">
                        ${packageHTML}
                    </div>
                    
                    ${featuresHTML}
                    
                    <div class="mt-5 pt-4 border-t border-gray-700/50">
                        <a href="https://steo.my.id/wa?text=${waText}" target="_blank" class="w-full flex items-center justify-center gap-2 py-3 bg-blue-600 text-white text-sm font-bold rounded-xl hover:bg-blue-500 transition shadow-lg shadow-blue-900/20 outline-none">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                            Pesan Sekarang
                        </a>
                    </div>
                `;
                grid.appendChild(card);
                delay += 0.05; // Efek muncul bergantian
            }
        }

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase().trim();
            let hasVisibleCards = false;

            document.querySelectorAll('.card').forEach(card => {
                const appName = card.getAttribute('data-name');
                if (appName.includes(searchTerm)) {
                    card.style.display = 'flex'; // Tetap menjaga struktur layout
                    hasVisibleCards = true;
                } else {
                    card.style.display = 'none';
                }
            });

            const noResults = document.getElementById('noResults');
            if (!hasVisibleCards && searchTerm !== '') {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
            }
        });

        // Jalankan saat web dibuka
        loadPricelist();
    </script>
</body>
</html>
