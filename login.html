<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Reseller - SteoType</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md glass-card rounded-3xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white mb-2">Reseller Area</h1>
            <p class="text-gray-400 text-sm font-medium">Silakan login untuk akses stok khusus</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 ml-1">Username</label>
                <input type="text" id="username" required 
                    class="w-full bg-[#161616] border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-all"
                    placeholder="Masukkan username">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 ml-1">Password</label>
                <input type="password" id="password" required 
                    class="w-full bg-[#161616] border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-all"
                    placeholder="••••••••">
            </div>
            
            <button type="submit" id="loginBtn"
                class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:bg-gray-200 transition-all active:scale-[0.98] mt-4">
                Masuk Sekarang
            </button>
        </form>

        <p id="message" class="mt-6 text-center text-sm font-medium"></p>
        
        <div class="mt-8 pt-6 border-t border-white/5 text-center">
            <a href="index.html" class="text-gray-500 hover:text-white text-xs transition-colors tracking-wide uppercase font-semibold italic">← Kembali ke Beranda</a>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzyTN-FNE2s99jzKCUznIApg2zlj4LooXWZDgBVIbhGiP6085R_oT14unWmf2_coIiU/exec";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('message');
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Loading state
            btn.disabled = true;
            btn.innerText = "Memverifikasi...";
            msg.className = "mt-6 text-center text-sm text-blue-400";
            msg.innerText = "Menghubungkan ke database...";

            try {
                const response = await fetch(`${API_URL}?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`);
                const data = await response.json();

                if (data.status === "success") {
                    msg.className = "mt-6 text-center text-sm text-green-400";
                    msg.innerText = "Login Berhasil! Mengalihkan...";
                    
                    // Simpan data login di browser (Simple Session)
                    localStorage.setItem('reseller_session', JSON.stringify({
                        isLoggedIn: true,
                        nama: data.nama,
                        username: user
                    }));

                    // Alihkan ke halaman khusus reseller
                    setTimeout(() => {
                        window.location.href = "reseller.html";
                    }, 1500);
                } else {
                    msg.className = "mt-6 text-center text-sm text-red-400";
                    msg.innerText = data.message;
                    btn.disabled = false;
                    btn.innerText = "Masuk Sekarang";
                }
            } catch (error) {
                msg.className = "mt-6 text-center text-sm text-red-400";
                msg.innerText = "Gagal terhubung ke server.";
                btn.disabled = false;
                btn.innerText = "Masuk Sekarang";
            }
        });
    </script>
</body>
</html>
