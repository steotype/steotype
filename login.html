<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Partner - SteoType</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* Menggunakan 100dvh agar pas dengan layar HP meskipun ada address bar */
        body { 
            background-color: #0a0a0a; 
            font-family: 'Inter', sans-serif; 
            height: 100dvh; 
            width: 100vw; 
            overflow: hidden; /* Mengunci total agar tidak bisa di-scroll */
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); }
        .fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="relative">
    
    <div class="absolute -top-32 -left-32 w-96 h-96 bg-blue-600/20 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-blue-900/20 blur-[120px] rounded-full pointer-events-none"></div>

    <div class="w-full max-w-md glass rounded-[2.5rem] p-10 shadow-2xl text-center relative z-10 fade-in-up border border-white/5 mx-6">
        <h1 class="text-3xl font-black text-white mb-2 italic tracking-tighter">STEO<span class="text-gray-500">TYPE</span></h1>
        <p class="text-blue-500 text-[10px] uppercase tracking-[0.3em] font-black mb-10">Partner Portal</p>
        
        <form id="loginForm" class="space-y-5">
            <div class="relative">
                <input type="text" id="username" placeholder="Username Partner" required 
                    class="w-full bg-gray-900/50 border border-white/10 rounded-2xl px-6 py-4 text-white text-sm font-medium focus:outline-none focus:border-blue-500 focus:bg-gray-900 transition-all placeholder-gray-600">
            </div>
            <div class="relative">
                <input type="password" id="password" placeholder="Password" required 
                    class="w-full bg-gray-900/50 border border-white/10 rounded-2xl px-6 py-4 text-white text-sm font-medium focus:outline-none focus:border-blue-500 focus:bg-gray-900 transition-all placeholder-gray-600">
            </div>
            <button type="submit" id="btn" class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-gray-200 active:scale-95 transition-all uppercase tracking-widest text-xs mt-2 shadow-xl shadow-white/5 outline-none">
                Masuk
            </button>
        </form>
        <p id="msg" class="mt-8 text-[11px] font-bold tracking-wider"></p>
    </div>

    <script>
        // Jalur API tersamar
        const API = "/api/reseller";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            btn.disabled = true; 
            btn.innerHTML = `<svg class="animate-spin h-4 w-4 text-black mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

            try {
                const res = await fetch(`${API}?action=login&username=${encodeURIComponent(username.value)}&password=${encodeURIComponent(password.value)}`);
                const data = await res.json();

                if (data.status === "success") {
                    localStorage.setItem('reseller_session', JSON.stringify({
                        isLoggedIn: true,
                        nama: data.nama,
                        diskon: data.diskon || "0"
                    }));
                    msg.className = "mt-8 text-green-400 font-bold uppercase tracking-widest text-[10px]";
                    msg.innerText = "Akses Diberikan. Membuka Katalog...";
                    setTimeout(() => window.location.href = "reseller.html", 1200);
                } else {
                    msg.className = "mt-8 text-red-400 uppercase tracking-widest text-[10px]";
                    msg.innerText = data.message || "Login Gagal.";
                    btn.disabled = false; btn.innerText = "MASUK";
                }
            } catch (e) {
                msg.className = "mt-8 text-red-400 uppercase tracking-widest text-[10px]";
                msg.innerText = "Server tidak merespon.";
                btn.disabled = false; btn.innerText = "MASUK";
            }
        });
    </script>
</body>
</html>
