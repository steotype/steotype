<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Reseller - SteoType</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md glass rounded-3xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white italic">STEO<span class="text-gray-500">TYPE</span></h1>
            <p class="text-gray-400 text-xs mt-2 uppercase tracking-widest">Reseller Area</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <input type="text" id="username" placeholder="Username" required class="w-full bg-[#161616] border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500">
            <input type="password" id="password" placeholder="Password" required class="w-full bg-[#161616] border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500">
            <button type="submit" id="btn" class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:bg-gray-200 transition-all">Masuk</button>
        </form>
        <p id="msg" class="mt-4 text-center text-sm"></p>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzyTN-FNE2s99jzKCUznIApg2zlj4LooXWZDgBVIbhGiP6085R_oT14unWmf2_coIiU/exec";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            btn.disabled = true; btn.innerText = "Memproses...";

            try {
                const res = await fetch(`${API}?username=${encodeURIComponent(username.value)}&password=${encodeURIComponent(password.value)}`);
                const data = await res.json();

                if (data.status === "success") {
                    localStorage.setItem('reseller_session', JSON.stringify({
                        isLoggedIn: true,
                        nama: data.nama,
                        diskon: data.diskon
                    }));
                    msg.className = "mt-4 text-center text-green-400";
                    msg.innerText = "Berhasil! Mengalihkan...";
                    setTimeout(() => window.location.href = "reseller.html", 1000);
                } else {
                    msg.className = "mt-4 text-center text-red-400";
                    msg.innerText = data.message;
                    btn.disabled = false; btn.innerText = "Masuk";
                }
            } catch (e) {
                msg.innerText = "Error koneksi.";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
