<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Reseller - SteoType</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // SATPAM: Cek sesi login
        const session = JSON.parse(localStorage.getItem('reseller_session'));
        if (!session || !session.isLoggedIn) {
            window.location.href = "login.html";
        }
    </script>
</head>
<body class="bg-[#0a0a0a] text-white p-6 font-sans">
    <div class="max-w-2xl mx-auto">
        
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-xl font-bold italic tracking-tighter">STEO<span class="text-gray-500">TYPE</span></h1>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 uppercase font-black tracking-widest mb-1" id="userDisplay"></p>
                <button onclick="localStorage.clear(); window.location.href='login.html';" 
                    class="text-[10px] bg-red-500/10 text-red-400 px-2 py-1 rounded-md font-bold border border-red-500/20 hover:bg-red-500/20 transition-all">
                    LOGOUT
                </button>
            </div>
        </div>

        <div class="bg-blue-500/10 border border-blue-500/20 p-6 rounded-3xl mb-8">
            <h2 class="font-bold text-lg">Halo, <span id="namaDisplay"></span>! 👋</h2>
            <p class="text-xs text-gray-400 mt-2 leading-relaxed">
                Harga di bawah otomatis dipotong diskon khusus reseller sebesar 
                <span class="text-blue-400 font-bold bg-blue-400/10 px-2 py-0.5 rounded" id="infoDiskon"></span>.
            </p>
        </div>

        <div id="stokList" class="space-y-3">
            <div id="loadingState" class="text-center py-12">
                <div class="animate-spin inline-block w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full mb-3"></div>
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Sinkronisasi Katalog...</p>
            </div>
        </div>

        <p class="text-center text-[10px] text-gray-600 mt-12 uppercase tracking-widest font-bold">SteoType Reseller System v2.0</p>
    </div>

    <script>
        // Tampilkan data profil dari sesi login
        document.getElementById('namaDisplay').innerText = session.nama;
        document.getElementById('userDisplay').innerText = session.nama;
        
        // Format tampilan diskon di banner
        let rawDiskon = session.diskon ? session.diskon.toString().toLowerCase() : "0";
        document.getElementById('infoDiskon').innerText = rawDiskon.includes('k') 
            ? rawDiskon.toUpperCase() 
            : "Rp " + parseInt(rawDiskon).toLocaleString('id-ID');

        async function loadStok() {
            const list = document.getElementById('stokList');
            try {
                // Menarik data dari folder functions/api/stok.js
                const res = await fetch("/api/stok");
                
                if (!res.ok) throw new Error("Gagal terhubung ke API (Status: " + res.status + ")");
                
                const data = await res.json();
                
                if (!Array.isArray(data)) throw new Error("Format data tidak valid.");

                list.innerHTML = ''; // Bersihkan loading

                // Kalkulasi nominal diskon (mendukung format 5K atau 5000)
                let dVal = rawDiskon.replace('k', '');
                let dFix = rawDiskon.includes('k') ? parseInt(dVal) * 1000 : parseInt(dVal);
                if (isNaN(dFix)) dFix = 0;

                data.forEach(item => {
                    // Ambil angka saja dari string harga (Rp 50.000 -> 50000)
                    let hargaAsli = parseInt(item.harga.replace(/[^0-9]/g, '')) || 0;
                    let hargaReseller = hargaAsli - dFix;
                    if (hargaReseller < 0) hargaReseller = 0;

                    list.innerHTML += `
                        <div class="bg-[#161616] border border-white/5 p-5 rounded-3xl flex justify-between items-center group hover:border-blue-500/30 transition-all">
                            <div>
                                <p class="text-[9px] font-black text-blue-400 uppercase tracking-[0.15em] mb-1">${item.spek}</p>
                                <h4 class="font-bold text-sm text-white">${item.akun}</h4>
                                <p class="text-xs text-gray-500 mt-1.5 font-medium">
                                    Rp ${hargaReseller.toLocaleString('id-ID')} 
                                    <span class="line-through opacity-20 ml-1.5 text-[10px]">Rp ${item.harga}</span>
                                </p>
                            </div>
                            <div class="text-right">
                                <span class="px-3 py-1.5 rounded-xl text-[9px] font-black tracking-tighter ${item.status.toLowerCase() === 'ready' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}">
                                    ${item.status.toUpperCase()}
                                </span>
                            </div>
                        </div>
                    `;
                });

            } catch (e) {
                console.error(e);
                list.innerHTML = `
                    <div class="bg-red-500/10 border border-red-500/20 p-8 rounded-[2rem] text-center">
                        <p class="text-red-400 text-xs font-black uppercase tracking-widest mb-2">Koneksi API Terputus</p>
                        <p class="text-white/50 text-[10px] leading-relaxed mb-4">${e.message}</p>
                        <button onclick="location.reload()" class="bg-white/10 hover:bg-white/20 text-white text-[9px] px-4 py-2 rounded-full font-bold uppercase transition-all">Coba Muat Ulang</button>
                    </div>
                `;
            }
        }

        // Jalankan fungsi
        loadStok();
    </script>
</body>
</html>
