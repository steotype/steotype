<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Reseller - SteoType</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const session = JSON.parse(localStorage.getItem('reseller_session'));
        if (!session || !session.isLoggedIn) window.location.href = "login.html";
    </script>
</head>
<body class="bg-[#0a0a0a] text-white p-6 font-sans">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-xl font-bold italic tracking-tighter">STEO<span class="text-gray-500">TYPE</span></h1>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 uppercase font-black tracking-widest mb-1" id="userDisplay"></p>
                <button onclick="localStorage.clear(); location.reload();" class="text-[10px] bg-red-500/10 text-red-400 px-2 py-1 rounded-md font-bold border border-red-500/20">LOGOUT</button>
            </div>
        </div>

        <div class="bg-blue-500/10 border border-blue-500/20 p-6 rounded-3xl mb-8">
            <h2 class="font-bold text-lg">Halo, <span id="nama"></span>! 👋</h2>
            <p class="text-xs text-gray-400 mt-2 leading-relaxed">
                Harga di bawah otomatis dipotong diskon khusus reseller sebesar 
                <span class="text-blue-400 font-bold bg-blue-400/10 px-2 py-0.5 rounded" id="infoDiskon"></span> 
                dari harga publik.
            </p>
        </div>

        <div id="stokList" class="space-y-3">
            <div class="text-center py-10">
                <div class="animate-spin inline-block w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full mb-3"></div>
                <p class="text-gray-500 text-xs font-medium">Sinkronisasi stok eksklusif...</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('nama').innerText = session.nama;
        document.getElementById('userDisplay').innerText = session.nama;
        
        // Format Tampilan Diskon
        let diskonText = session.diskon.toString().toLowerCase();
        document.getElementById('infoDiskon').innerText = diskonText.includes('k') ? diskonText.toUpperCase() : "Rp " + parseInt(diskonText).toLocaleString('id-ID');

        async function loadStok() {
            try {
                const res = await fetch("/api/stok");
                const data = await res.json();
                const list = document.getElementById('stokList');
                list.innerHTML = '';

                // Logika Perhitungan Diskon
                let dVal = diskonText.replace('k', '');
                let dFix = diskonText.includes('k') ? parseInt(dVal) * 1000 : parseInt(dVal);
                if (isNaN(dFix)) dFix = 0;

                data.forEach(item => {
                    let hAsli = parseInt(item.harga.replace(/[^0-9]/g, '')) || 0;
                    let hReseller = hAsli - dFix;
                    if (hReseller < 0) hReseller = 0;

                    list.innerHTML += `
                        <div class="bg-[#161616] border border-white/5 p-5 rounded-3xl flex justify-between items-center group hover:border-blue-500/30 transition-all">
                            <div>
                                <p class="text-[9px] font-black text-blue-500 uppercase tracking-[0.15em] mb-1">${item.spek}</p>
                                <h4 class="font-bold text-sm text-white">${item.akun}</h4>
                                <p class="text-xs text-gray-500 mt-1.5 font-medium">
                                    Rp ${hReseller.toLocaleString('id-ID')} 
                                    <span class="line-through opacity-20 ml-1.5 text-[10px]">Rp ${item.harga}</span>
                                </p>
                            </div>
                            <span class="px-3 py-1.5 rounded-xl text-[9px] font-black ${item.status.toLowerCase() === 'ready' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}">
                                ${item.status.toUpperCase()}
                            </span>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('stokList').innerHTML = `<p class="text-center text-red-400 text-xs py-10">Gagal memuat data. Periksa koneksi API.</p>`;
            }
        }
        loadStok();
    </script>
</body>
</html>
