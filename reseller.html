<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Partner - SteoType</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        .product-card { transition: all 0.3s ease; }
        .fade-in-down { animation: fadeInDown 0.5s ease-out; }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Style scrollbar agar rapi */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
    <script>
        const session = JSON.parse(localStorage.getItem('reseller_session'));
        if (!session || !session.isLoggedIn) { window.location.href = "login.html"; }
    </script>
</head>
<body class="antialiased pb-20">

    <nav class="fixed top-0 w-full z-40 glass border-b border-white/5 py-4 px-6 flex justify-between items-center">
        <h1 class="text-xl font-black italic tracking-tighter">STEO<span class="text-gray-500">TYPE</span></h1>
        <button onclick="localStorage.clear(); window.location.href='login.html';" class="text-[9px] font-black bg-red-500/10 text-red-500 px-4 py-2 rounded-xl border border-red-500/10 uppercase tracking-widest hover:bg-red-500/20 transition-all">Logout</button>
    </nav>

    <main class="max-w-6xl mx-auto pt-28 px-6">
        <div class="glass p-8 rounded-[2.5rem] mb-12 flex flex-col md:flex-row justify-between items-center relative overflow-hidden">
            <div class="relative z-10 text-center md:text-left">
                <h2 class="text-2xl font-black mb-1">Halo, <span id="nmDisplay" class="text-blue-500"></span>! 👋</h2>
                <p class="text-sm text-gray-500 font-medium">Katalog partner dengan penyesuaian harga reseller otomatis.</p>
            </div>
            <div class="mt-6 md:mt-0 text-center bg-white/5 border border-white/10 px-8 py-4 rounded-3xl relative z-10">
                <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest mb-1 text-center">Benefit Diskon</p>
                <p id="dscDisplay" class="text-2xl font-black text-white italic"></p>
            </div>
        </div>

        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div id="loadingIndicator" class="col-span-full text-center py-24 opacity-20 font-black uppercase tracking-[0.5em] text-xs">Syncing Database...</div>
        </div>
    </main>

    <div id="floatingCart" class="fixed bottom-6 left-6 z-50 hidden">
        <button onclick="openCartModal()" class="flex items-center gap-3 bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-2xl shadow-2xl shadow-blue-900/40 transition-all active:scale-95 group">
            <div class="relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cartBadge" class="absolute -top-2 -right-2 bg-white text-blue-600 text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-blue-600">0</span>
            </div>
            <span class="font-bold text-sm tracking-tight uppercase">Lihat Pesanan</span>
        </button>
    </div>

    <div id="cartModal" class="fixed inset-0 z-[60] hidden">
        <div id="cartModalBackdrop" class="absolute inset-0 bg-black/80 backdrop-blur-sm transition-opacity duration-300 opacity-0" onclick="closeCartModal()"></div>
        <div class="flex items-center justify-center min-h-screen p-4">
            <div id="cartModalContent" class="relative w-full max-w-lg glass rounded-[2.5rem] overflow-hidden transition-all duration-300 opacity-0 scale-95 shadow-2xl border border-white/10">
                <div class="p-8 border-b border-white/5 flex justify-between items-center">
                    <h3 class="text-xl font-black italic tracking-tighter uppercase">Keranjang<span class="text-blue-500">.</span></h3>
                    <button onclick="closeCartModal()" class="text-gray-500 hover:text-white text-2xl">&times;</button>
                </div>
                <div id="cartItemsList" class="p-8 max-h-[40vh] overflow-y-auto space-y-4">
                    </div>
                <div class="p-8 bg-white/[0.02] border-t border-white/5">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Total Partner Price</span>
                        <span id="cartTotal" class="text-2xl font-black text-blue-500">Rp 0</span>
                    </div>
                    <button onclick="proceedToCheckout()" class="flex justify-center items-center gap-3 w-full py-5 bg-gradient-to-r from-[#25D366] to-[#128C7E] hover:from-[#128C7E] hover:to-[#075E54] text-white font-black rounded-2xl transition shadow-xl shadow-green-900/20 uppercase text-xs tracking-widest">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                        Kirim ke WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxM0LN44xzbUy4VDb8fVk_Olb3avz7m-AWlB_iKkDGprIjSayyaac4hBOlMYAznJGvB/exec";
        let cart = [];

        // UI IDENTITY
        document.getElementById('nmDisplay').innerText = session.nama;
        const rawDsc = String(session.diskon || "0").toLowerCase();
        
        function parsePrice(input) {
            let s = String(input).toLowerCase().replace(/[^0-9k]/g, '');
            if (s.includes('k')) return parseFloat(s.replace('k', '')) * 1000;
            return parseInt(s) || 0;
        }
        document.getElementById('dscDisplay').innerText = rawDsc.includes('k') ? rawDsc.toUpperCase() : "Rp " + parsePrice(rawDsc).toLocaleString('id-ID');

        // CORE DATA FETCHING
        async function loadData() {
            const grid = document.getElementById('productGrid');
            const loader = document.getElementById('loadingIndicator');
            try {
                const response = await fetch(`${API}?action=get_stok`);
                const rawData = await response.json();
                const diskon = parsePrice(rawDsc);
                
                grid.innerHTML = '';
                loader.style.display = 'none';

                rawData.forEach(item => {
                    const isReady = String(item.status_stok).toLowerCase() === 'ready';
                    const hAsli = parsePrice(item.harga);
                    const hFinal = hAsli - diskon;
                    const finalPriceText = "Rp " + Math.max(0, hFinal).toLocaleString('id-ID');

                    // --- LOGIKA IKON (PERSIS VERSI PUBLIK) ---
                    const telpIcon = (String(item.verif_telepon).toLowerCase().match(/tidak|kosong|-|^$/)) ? '❌' : '✅';
                    const emailIcon = (String(item.email).toLowerCase().match(/tidak|kosong|-|^$/)) ? '❌' : '✅';
                    const kesIcon = String(item.kesehatan).toLowerCase().includes('go green') ? '🛡️' : '🚦';
                    const htmtIcon = String(item.status_htmt).toLowerCase().includes('htmt') ? '🔥' : (String(item.status_htmt).toLowerCase().includes('mt') ? '👍🏻' : '⚡');

                    const cardHtml = `
                        <div class="product-card glass rounded-[2.5rem] border border-white/5 overflow-hidden fade-in-down ${!isReady ? 'opacity-50' : ''}" data-username="${item.username}">
                            <div class="h-24 bg-white/5 relative">
                                <span class="absolute top-4 left-4 px-3 py-1 bg-black/40 text-gray-400 text-[9px] font-mono rounded-xl border border-white/10 uppercase tracking-widest">KODE: ${item.kode}</span>
                                <span class="absolute top-4 right-4 px-3 py-1 ${isReady ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'} text-[10px] uppercase font-black rounded-xl">${item.status_stok}</span>
                            </div>
                            <div class="px-6 pb-6">
                                <div class="flex justify-between items-start -mt-10 mb-4 relative z-10">
                                    <div class="w-20 h-20 rounded-full border-4 border-[#0a0a0a] bg-gray-900 flex items-center justify-center text-gray-700 overflow-hidden shadow-xl">
                                        <svg class="w-10 h-10 mt-2" fill="currentColor" viewBox="0 0 24 24"><path d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                                    </div>
                                    <div class="mt-12">
                                        <a href="${item.link_akun}" target="_blank" class="inline-flex items-center gap-1.5 px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-[11px] font-bold text-white hover:bg-white/10 transition-all shadow-sm">
                                            Cek Profil <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                        </a>
                                    </div>
                                </div>

                                <div class="mb-5">
                                    <h2 class="text-lg font-black text-white tracking-tight">Akun X ${item.tahun_akun}</h2>
                                    <p class="text-sm text-gray-500 font-medium tracking-tight">@${item.username}</p>
                                </div>

                                <div class="text-[12px] text-gray-300 space-y-2 mb-6 bg-white/[0.02] p-4 rounded-2xl border border-white/5">
                                    <p class="flex items-center gap-2">${emailIcon} <span class="text-gray-500 font-bold uppercase text-[9px] tracking-widest">Email:</span> ${item.email}</p>
                                    <p class="flex items-center gap-2">${telpIcon} <span class="text-gray-500 font-bold uppercase text-[9px] tracking-widest">Verif Telp:</span> ${item.verif_telepon}</p>
                                    <p class="flex items-center gap-2">${kesIcon} <span class="text-gray-500 font-bold uppercase text-[9px] tracking-widest">Kesehatan:</span> <span class="text-blue-400 font-bold">${item.kesehatan}</span></p>
                                    <p class="flex items-center gap-2">${htmtIcon} <span class="text-gray-500 font-bold uppercase text-[9px] tracking-widest">Status:</span> <span class="font-bold">${item.status_htmt}</span></p>
                                </div>

                                <div class="flex gap-6 text-xs text-gray-500 mb-6 px-1">
                                    <p><span class="text-white font-black">${item.postingan}</span> <span class="uppercase text-[9px] font-bold tracking-widest ml-1">Posts</span></p>
                                    <p><span class="text-white font-black">${item.followers}</span> <span class="uppercase text-[9px] font-bold tracking-widest ml-1">Followers</span></p>
                                </div>

                                <div class="pt-6 border-t border-white/10 flex justify-between items-center">
                                    <div>
                                        <p class="text-[9px] text-gray-600 uppercase font-black tracking-[0.2em] mb-1">Partner Price</p>
                                        <p class="text-xl font-black text-blue-500">${finalPriceText}</p>
                                        <p class="text-[10px] text-gray-700 line-through font-bold">Rp ${hAsli.toLocaleString('id-ID')}</p>
                                    </div>
                                    <button onclick="toggleCart('${item.kode}', '${item.username}', '${finalPriceText}')" class="btn-add-cart px-6 py-3 ${isReady ? 'bg-white text-black' : 'bg-gray-800 text-gray-600'} text-[11px] font-black rounded-xl hover:bg-blue-600 hover:text-white transition-all shadow-xl shadow-black/20 uppercase tracking-widest outline-none">Tambah</button>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', cardHtml);
                });
                syncCartUI();
            } catch (e) {
                grid.innerHTML = '<p class="text-center text-red-400 py-10 max-w-md mx-auto font-bold uppercase text-[10px] tracking-widest">Gagal memuat database stok.</p>';
            }
        }

        // --- SISTEM KERANJANG (Sama Persis dengan Script.js) ---
        function toggleCart(kode, username, harga) {
            const index = cart.findIndex(item => item.username === username);
            if (index > -1) {
                cart.splice(index, 1);
            } else {
                cart.push({kode, username, harga});
            }
            updateCartUI();
            syncCartUI(); 
        }

        function syncCartUI() {
            document.querySelectorAll('.product-card').forEach(card => {
                const username = card.dataset.username;
                const inCart = cart.some(c => c.username === username);
                const btn = card.querySelector('.btn-add-cart');
                if (inCart) {
                    card.classList.add('border-blue-500/50', 'shadow-blue-900/20', 'shadow-xl');
                    if(btn) {
                        btn.className = "btn-add-cart px-6 py-3 bg-blue-600 text-white text-[11px] font-black rounded-xl transition-all shadow-lg shadow-blue-900/20 uppercase tracking-widest outline-none";
                        btn.innerText = "Terpilih";
                    }
                } else {
                    card.classList.remove('border-blue-500/50', 'shadow-blue-900/20', 'shadow-xl');
                    if(btn) {
                        btn.className = "btn-add-cart px-6 py-3 bg-white text-black text-[11px] font-black rounded-xl hover:bg-blue-600 hover:text-white transition-all shadow-xl shadow-black/20 uppercase tracking-widest outline-none";
                        btn.innerText = "Tambah";
                    }
                }
            });
        }

        function updateCartUI() {
            const badge = document.getElementById('cartBadge');
            const floatingCart = document.getElementById('floatingCart');
            if (cart.length > 0) {
                floatingCart.classList.remove('hidden');
                badge.innerText = cart.length;
            } else {
                floatingCart.classList.add('hidden');
                closeCartModal(); 
            }
        }

        function openCartModal() {
            const list = document.getElementById('cartItemsList');
            const total = document.getElementById('cartTotal');
            list.innerHTML = '';
            let sum = 0;
            
            cart.forEach((item, idx) => {
                sum += parsePrice(item.harga);
                list.innerHTML += `
                    <div class="flex justify-between items-center py-4 border-b border-white/5">
                        <div>
                            <p class="text-[9px] font-mono text-gray-500 uppercase mb-1 tracking-widest">${item.kode}</p>
                            <p class="text-sm font-bold text-white">@${item.username}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <p class="text-sm font-black text-blue-500">${item.harga}</p>
                            <button onclick="toggleCart('${item.kode}', '${item.username}', '${item.harga}'); openCartModal();" class="text-gray-600 hover:text-red-400 transition bg-white/5 p-2 rounded-xl">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>`;
            });
            
            total.innerText = "Rp " + sum.toLocaleString('id-ID');
            
            const modal = document.getElementById('cartModal');
            const backdrop = document.getElementById('cartModalBackdrop');
            const content = document.getElementById('cartModalContent');
            modal.classList.remove('hidden');
            setTimeout(() => { 
                backdrop.classList.replace('opacity-0', 'opacity-100'); 
                content.classList.replace('opacity-0', 'opacity-100');
                content.classList.replace('scale-95', 'scale-100');
            }, 10);
        }

        function closeCartModal() {
            const modal = document.getElementById('cartModal');
            const backdrop = document.getElementById('cartModalBackdrop');
            const content = document.getElementById('cartModalContent');
            backdrop.classList.replace('opacity-100', 'opacity-0');
            content.classList.replace('opacity-100', 'opacity-0');
            content.classList.replace('scale-100', 'scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function proceedToCheckout() {
            closeCartModal();
            let message = `Halo SteoType, saya reseller *${session.nama}* mau order ${cart.length} akun:\n\n`;
            let sumHarga = 0;
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.kode} | ${item.username} (${item.harga})\n`;
                sumHarga += parsePrice(item.harga);
            });
            message += `\nTotal: Rp ${sumHarga.toLocaleString('id-ID')}\n\nBisa di test dulu kak?`;
            window.open(`https://wa.me/6285959161539?text=${encodeURIComponent(message)}`, '_blank');
        }

        window.onload = loadData;
    </script>
</body>
</html>
