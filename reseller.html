<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Reseller - SteoType</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
        .stok-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    </style>
    <script>
        const session = JSON.parse(localStorage.getItem('reseller_session'));
        if (!session || !session.isLoggedIn) { window.location.href = "login.html"; }
    </script>
</head>
<body class="bg-[#0a0a0a] text-white p-6 antialiased">
    <div class="max-w-6xl mx-auto">
        
        <nav class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-extrabold italic tracking-tighter text-white">STEO<span class="text-gray-500">TYPE</span></h1>
                <p class="text-[10px] text-blue-500 font-black uppercase tracking-[0.3em]">Reseller Dashboard</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">${session.nama}</p>
                </div>
                <button onclick="localStorage.clear(); window.location.href='login.html';" 
                    class="text-[10px] bg-red-500/10 text-red-400 px-4 py-2 rounded-xl font-black border border-red-500/20 hover:bg-red-500/20 transition-all uppercase">
                    Logout
                </button>
            </div>
        </nav>

        <div class="glass-card p-8 rounded-[2.5rem] mb-12 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h2 class="font-bold text-xl mb-1">Selamat Datang, ${session.nama}!</h2>
                <p class="text-sm text-gray-400 font-medium">Katalog di bawah otomatis menggunakan harga mitra SteoType.</p>
            </div>
            <div class="bg-white/5 border border-white/10 px-6 py-4 rounded-2xl text-center min-w-[150px]">
                <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest mb-1">Diskon Anda</p>
                <p id="dscBadge" class="text-xl font-black text-blue-500"></p>
            </div>
        </div>

        <div id="stokContainer" class="stok-grid">
            <div class="col-span-full text-center py-20 text-gray-700 font-black uppercase tracking-[0.5em] animate-pulse text-xs">
                Synchronizing Database...
            </div>
        </div>

    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxM0LN44xzbUy4VDb8fVk_Olb3avz7m-AWlB_iKkDGprIjSayyaac4hBOlMYAznJGvB/exec";
        
        // Fungsi Pintar untuk merubah teks (50K, 10k, Rp 50.000) menjadi Angka Murni
        function parsePrice(input) {
            let val = String(input).toLowerCase();
            if (val.includes('k')) {
                return parseFloat(val.replace('k', '').replace(/[^0-9.]/g, '')) * 1000;
            }
            return parseInt(val.replace(/[^0-9]/g, '')) || 0;
        }

        // Tampilkan Info Diskon di Banner
        const diskonRaw = String(session.diskon || "0");
        document.getElementById('dscBadge').innerText = diskonRaw.toLowerCase().includes('k') ? diskonRaw.toUpperCase() : "Rp " + parsePrice(diskonRaw).toLocaleString('id-ID');

        async function loadStok() {
            const container = document.getElementById('stokContainer');
            try {
                const res = await fetch(`${API}?action=get_stok`);
                const data = await res.json();
                container.innerHTML = '';

                const potonganNominal = parsePrice(diskonRaw);

                data.forEach(item => {
                    const hargaAsli = parsePrice(item.harga);
                    const hargaFinal = hargaAsli - potonganNominal;
                    const isReady = String(item.status_stok).toLowerCase() === 'ready';

                    container.innerHTML += `
                        <div class="glass-card p-6 rounded-[2rem] flex flex-col justify-between group hover:border-blue-500/40 transition-all duration-500 hover:-translate-y-1">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-[9px] font-black bg-blue-500/10 text-blue-500 px-3 py-1 rounded-full border border-blue-500/10 uppercase tracking-widest">
                                        Account ${item.tahun_akun}
                                    </span>
                                    <span class="px-3 py-1 rounded-lg text-[9px] font-black uppercase ${isReady ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}">
                                        ${item.status_stok}
                                    </span>
                                </div>
                                <h3 class="text-lg font-extrabold text-white mb-2 group-hover:text-blue-400 transition-colors">@${item.username}</h3>
                                <div class="space-y-2 mb-6">
                                    <div class="flex items-center text-xs text-gray-400">
                                        <span class="w-20 font-bold uppercase text-[9px] text-gray-600">Followers</span>
                                        <span class="text-white">${item.followers}</span>
                                    </div>
                                    <div class="flex items-center text-xs text-gray-400">
                                        <span class="w-20 font-bold uppercase text-[9px] text-gray-600">Kesehatan</span>
                                        <span class="${item.kesehatan.toLowerCase() === 'aman' ? 'text-green-400' : 'text-yellow-400'} font-bold">${item.kesehatan}</span>
                                    </div>
                                    <div class="flex items-center text-xs text-gray-400">
                                        <span class="w-20 font-bold uppercase text-[9px] text-gray-600">Verif</span>
                                        <span class="text-white">${item.verif_telepon}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="pt-4 border-t border-white/5 flex justify-between items-end">
                                <div>
                                    <p class="text-[9px] text-gray-600 font-bold uppercase mb-1">Reseller Price</p>
                                    <p class="text-xl font-black text-white">Rp ${Math.max(0, hargaFinal).toLocaleString('id-ID')}</p>
                                    <p class="text-[10px] text-gray-700 line-through font-bold">Rp ${hargaAsli.toLocaleString('id-ID')}</p>
                                </div>
                                <a href="${item.link_akun}" target="_blank" class="bg-white text-black p-3 rounded-2xl hover:bg-blue-500 hover:text-white transition-all shadow-lg active:scale-90">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z" />
                                        <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z" />
                                    </svg>
                                </a>
                            </div>
                        </div>`;
                });
            } catch (e) {
                container.innerHTML = `<div class="col-span-full text-center p-10 bg-red-500/5 border border-red-500/10 rounded-3xl text-red-500 text-xs font-bold uppercase tracking-widest">Gagal Memuat Database Akun</div>`;
            }
        }
        loadStok();
    </script>
</body>
</html>
