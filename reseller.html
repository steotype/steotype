<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reseller Dashboard - SteoType</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s ease; }
        .glass-card:hover { border-color: rgba(59, 130, 246, 0.5); transform: translateY(-4px); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter">STEO<span class="text-gray-600">TYPE</span></h1>
                <p class="text-[10px] text-blue-500 font-black uppercase tracking-[0.3em]">Reseller Area</p>
            </div>
            <button onclick="localStorage.clear(); window.location.href='login.html';" class="text-[10px] bg-red-500/10 text-red-400 px-4 py-2 rounded-xl font-bold border border-red-500/20 uppercase tracking-widest">Logout</button>
        </div>

        <div class="glass-card p-8 rounded-[2.5rem] mb-10 flex flex-col md:flex-row justify-between items-center">
            <div class="mb-4 md:mb-0">
                <h2 class="text-xl font-bold" id="welcomeName">Selamat Datang!</h2>
                <p class="text-xs text-gray-400 mt-1">Katalog harga khusus mitra aktif SteoType.</p>
            </div>
            <div class="text-center bg-white/5 px-6 py-3 rounded-2xl border border-white/10">
                <p class="text-[9px] text-gray-500 font-black uppercase mb-1">Potongan Harga</p>
                <p id="dscInfo" class="text-xl font-black text-blue-500">-</p>
            </div>
        </div>

        <div id="stokContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 animate-pulse text-gray-600 font-bold uppercase tracking-widest text-xs">Menyambungkan Database...</div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxM0LN44xzbUy4VDb8fVk_Olb3avz7m-AWlB_iKkDGprIjSayyaac4hBOlMYAznJGvB/exec";
        const session = JSON.parse(localStorage.getItem('reseller_session'));

        if (!session) window.location.href = "login.html";

        // Fungsi pembersih harga (Bisa 50K, 50.000, Rp 50k)
        function cleanPrice(p) {
            let s = String(p).toLowerCase().replace(/[^0-9k.]/g, '');
            if (s.includes('k')) return parseFloat(s.replace('k', '')) * 1000;
            return parseInt(s) || 0;
        }

        document.getElementById('welcomeName').innerText = "Halo, " + session.nama + "!";
        const diskonRaw = String(session.diskon);
        document.getElementById('dscInfo').innerText = diskonRaw.toLowerCase().includes('k') ? diskonRaw.toUpperCase() : "Rp " + cleanPrice(diskonRaw).toLocaleString('id-ID');

        async function loadStok() {
            const container = document.getElementById('stokContainer');
            try {
                const res = await fetch(`${API}?action=get_stok`);
                const data = await res.json();
                container.innerHTML = '';

                const diskon = cleanPrice(diskonRaw);

                data.forEach(item => {
                    const hargaAsli = cleanPrice(item.harga);
                    const hargaReseller = hargaAsli - diskon;
                    const ready = String(item.status_stok).toLowerCase() === 'ready';

                    container.innerHTML += `
                        <div class="glass-card p-6 rounded-[2rem] flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between mb-4">
                                    <span class="text-[9px] font-black bg-blue-500/10 text-blue-500 px-3 py-1 rounded-full border border-blue-500/10 uppercase">${item.tahun_akun || 'Akun'}</span>
                                    <span class="text-[9px] font-black uppercase ${ready ? 'text-green-400' : 'text-red-400'}">${item.status_stok}</span>
                                </div>
                                <h3 class="text-lg font-black mb-4 tracking-tight">@${item.username}</h3>
                                <div class="space-y-2 mb-6">
                                    <div class="flex justify-between text-[11px]"><span class="text-gray-500 font-bold uppercase">Followers</span><span class="font-bold">${item.followers}</span></div>
                                    <div class="flex justify-between text-[11px]"><span class="text-gray-500 font-bold uppercase">Kesehatan</span><span class="text-green-500 font-bold">${item.kesehatan}</span></div>
                                    <div class="flex justify-between text-[11px]"><span class="text-gray-500 font-bold uppercase">Verifikasi</span><span class="font-bold">${item.verif_telepon}</span></div>
                                </div>
                            </div>
                            <div class="pt-4 border-t border-white/5 flex justify-between items-center">
                                <div>
                                    <p class="text-[10px] font-bold text-white tracking-tight">Rp ${Math.max(0, hargaReseller).toLocaleString('id-ID')}</p>
                                    <p class="text-[9px] text-gray-600 line-through font-bold">Rp ${hargaAsli.toLocaleString('id-ID')}</p>
                                </div>
                                <a href="${item.link_akun}" target="_blank" class="bg-white text-black p-2.5 rounded-xl hover:bg-blue-500 hover:text-white transition-all shadow-lg shadow-white/5">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                                </a>
                            </div>
                        </div>`;
                });
            } catch (e) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-red-500 text-xs font-bold uppercase tracking-widest">Database Error: Periksa Spreadsheet Anda</div>`;
            }
        }
        loadStok();
    </script>
</body>
</html>
