<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner Area - SteoType</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f1115; }
    .skeleton { background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen relative">

  <script>
    const session = JSON.parse(localStorage.getItem('reseller_session') || '{}');
    if (!session.isLoggedIn || !session.token) {
      window.location.href = "login.html";
    }
  </script>

  <main class="px-6 w-full max-w-md md:max-w-3xl lg:max-w-5xl mx-auto pb-8 relative z-0 pt-8"> 
    
    <div class="max-w-md mx-auto mb-6 flex justify-between items-center bg-gray-800/30 p-4 rounded-2xl border border-white/5">
      <div>
        <p class="text-[9px] text-gray-500 font-black uppercase tracking-[0.2em]">Partner Active</p>
        <p class="text-white font-bold text-sm" id="partnerName">...</p>
      </div>
      <button onclick="logout()" class="text-[9px] bg-red-500/10 text-red-500 px-3 py-1.5 rounded-lg border border-red-500/10 font-black uppercase tracking-widest hover:bg-red-500/20 transition-all">Keluar</button>
    </div>

    <div class="max-w-md mx-auto space-y-5">
      <div class="grid grid-cols-2 gap-2.5">
        <button onclick="switchTab('ready')" id="btn-ready" class="w-full py-2.5 rounded-xl border border-blue-500 bg-blue-600 text-xs font-bold text-white shadow-lg shadow-blue-900/20 transition-all outline-none">
          READY (<span id="count-ready">0</span>)
        </button>
        <button onclick="switchTab('sold')" id="btn-sold" class="w-full py-2.5 rounded-xl border border-gray-700 bg-gray-800 text-xs font-bold text-gray-400 hover:bg-gray-700 transition-all outline-none">
          SOLD (<span id="count-sold">0</span>)
        </button>
      </div>

      <div class="relative">
        <input type="text" id="searchInput" onkeyup="filterAccounts()" placeholder="Cari akun..." class="w-full bg-gray-800/80 border border-gray-700 text-gray-200 text-sm rounded-xl block pl-10 pr-3 py-3 outline-none focus:border-blue-500 transition-colors">
        <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
      </div>
    </div> 
    
    <div id="loadingIndicator" class="mt-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="skeleton h-64 w-full rounded-2xl"></div>
      <div class="skeleton h-64 w-full rounded-2xl"></div>
      <div class="skeleton h-64 w-full rounded-2xl"></div>
    </div>

    <div id="productGrid" class="mt-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  </main>

  <button id="floatingCart" onclick="openCartModal()" class="fixed bottom-5 left-5 z-40 bg-blue-600 text-white p-3 rounded-full shadow-lg transition-transform transform hover:scale-110 flex items-center justify-center hidden">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
    <span id="cartBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold h-5 w-5 flex items-center justify-center rounded-full border-2 border-gray-900">0</span>
  </button>

  <div id="cartModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-6">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeCartModal()"></div>
    <div class="relative bg-gray-900 border border-gray-800 w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
        <div class="p-5 border-b border-gray-800 flex justify-between items-center">
            <h3 class="font-bold text-white uppercase tracking-widest text-[10px]">Keranjang Partner</h3>
            <button onclick="closeCartModal()" class="text-gray-500 hover:text-white text-lg">✕</button>
        </div>
        <div id="cartList" class="p-5 max-h-[40vh] overflow-y-auto space-y-3"></div>
        <div class="p-5 bg-gray-800/50">
            <div class="flex justify-between mb-4">
                <span class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Total Bayar</span>
                <span id="totalPrice" class="text-blue-400 font-black text-lg">Rp 0</span>
            </div>
            <button onclick="checkoutWA()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase tracking-widest text-[10px] hover:bg-gray-200 transition-all">
                Kirim ke WhatsApp
            </button>
        </div>
    </div>
  </div>

  <script>
    const SPREADSHEET_URL = "/api/reseller?action=get_stok";
    let allData = [];
    let cart = [];
    let currentTab = 'ready';

    document.getElementById('partnerName').innerText = session.nama;

    // FUNGSI LOAD DATA (DENGAN TOKEN KEAMANAN)
    async function loadData() {
      const loader = document.getElementById('loadingIndicator');
      try {
        // Mengirim token ke server agar harga dipotong di sisi Google Script
        const response = await fetch(`${SPREADSHEET_URL}&token=${session.token}`);
        allData = await response.json();
        
        loader.style.display = 'none';
        renderProducts();
        updateCounts();
      } catch (e) {
        loader.style.display = 'none';
        alert("Sesi berakhir atau server bermasalah. Silakan login ulang.");
        logout();
      }
    }

    function renderProducts() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      
      const searchVal = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allData.filter(i => {
        const statusMatch = String(i.status).toLowerCase() === currentTab;
        const searchMatch = JSON.stringify(i).toLowerCase().includes(searchVal);
        return statusMatch && searchMatch;
      });

      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'bg-gray-800/30 border border-gray-700/50 rounded-2xl p-6 flex flex-col space-y-4 hover:border-gray-600 transition-all';
        
        // Harga matang dari server
        const priceFinal = new Intl.NumberFormat('id-ID').format(item.harga_final_num);
        const priceOriginal = new Intl.NumberFormat('id-ID').format(item.harga_asli_num);

        div.innerHTML = `
          <div class="flex justify-between items-center">
            <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">ID: ${item.id}</span>
            <span class="text-[10px] text-gray-500 font-bold">${item.tahun || ''}</span>
          </div>
          <div>
            <h3 class="text-white font-bold text-base uppercase tracking-tight">${item.kategori}</h3>
            <p class="text-gray-500 text-[11px] font-medium">${item.username || 'Protected Account'}</p>
          </div>
          <div class="pt-1">
            <p class="text-[10px] text-gray-600 line-through">Rp ${priceOriginal}</p>
            <p class="text-blue-400 font-black text-xl tracking-tighter">Rp ${priceFinal}</p>
          </div>
          ${currentTab === 'ready' ? 
            `<button onclick="addToCart('${item.id}')" class="w-full bg-white text-black font-bold py-2.5 rounded-xl text-[10px] uppercase tracking-widest hover:bg-gray-200 transition-all">Tambah</button>` 
            : ''}
        `;
        grid.appendChild(div);
      });
    }

    function addToCart(id) {
      const item = allData.find(i => i.id == id);
      if(!cart.find(c => c.id == id)) {
        cart.push(item);
        updateCartUI();
      }
    }

    function updateCartUI() {
      const badge = document.getElementById('cartBadge');
      const btn = document.getElementById('floatingCart');
      badge.innerText = cart.length;
      if(cart.length > 0) btn.classList.remove('hidden');
      else btn.classList.add('hidden');
    }

    function openCartModal() {
      document.getElementById('cartModal').classList.remove('hidden');
      const list = document.getElementById('cartList');
      let total = 0;
      list.innerHTML = '';
      
      cart.forEach((item, index) => {
        total += item.harga_final_num;
        const div = document.createElement('div');
        div.className = 'flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5';
        div.innerHTML = `
          <div class="text-[10px]">
            <p class="font-black text-blue-500 uppercase">${item.id}</p>
            <p class="text-white font-bold">${item.kategori}</p>
          </div>
          <div class="flex items-center gap-3">
            <p class="text-xs font-black text-white">Rp ${new Intl.NumberFormat('id-ID').format(item.harga_final_num)}</p>
            <button onclick="removeItem(${index})" class="text-red-500">✕</button>
          </div>
        `;
        list.appendChild(div);
      });
      document.getElementById('totalPrice').innerText = `Rp ${new Intl.NumberFormat('id-ID').format(total)}`;
    }

    function removeItem(index) {
      cart.splice(index, 1);
      if(cart.length === 0) closeCartModal();
      else openCartModal();
      updateCartUI();
    }

    function closeCartModal() { document.getElementById('cartModal').classList.add('hidden'); }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('btn-ready').className = tab === 'ready' ? 'w-full py-2.5 rounded-xl border border-blue-500 bg-blue-600 text-xs font-bold text-white shadow-lg' : 'w-full py-2.5 rounded-xl border border-gray-700 bg-gray-800 text-xs font-bold text-gray-400';
      document.getElementById('btn-sold').className = tab === 'sold' ? 'w-full py-2.5 rounded-xl border border-blue-500 bg-blue-600 text-xs font-bold text-white shadow-lg' : 'w-full py-2.5 rounded-xl border border-gray-700 bg-gray-800 text-xs font-bold text-gray-400';
      renderProducts();
    }

    function updateCounts() {
      document.getElementById('count-ready').innerText = allData.filter(i => String(i.status).toLowerCase() === 'ready').length;
      document.getElementById('count-sold').innerText = allData.filter(i => String(i.status).toLowerCase() === 'sold').length;
    }

    function filterAccounts() { renderProducts(); }

    function checkoutWA() {
      let message = `Halo Admin SteoType, Saya Partner: ${session.nama}\n\nIngin membeli akun berikut:\n`;
      let total = 0;
      cart.forEach((item, i) => {
        message += `${i+1}. ID: ${item.id} - ${item.kategori} (Rp ${new Intl.NumberFormat('id-ID').format(item.harga_final_num)})\n`;
        total += item.harga_final_num;
      });
      message += `\nTotal Pembayaran: Rp ${new Intl.NumberFormat('id-ID').format(total)}\nMohon instruksi pembayarannya.`;
      window.open(`https://wa.me/6285959161539?text=${encodeURIComponent(message)}`, '_blank');
    }

    function logout() {
      localStorage.removeItem('reseller_session');
      window.location.href = "login.html";
    }

    loadData();
  </script>
</body>
</html>
