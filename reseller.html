<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Reseller - SteoType</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const session = JSON.parse(localStorage.getItem('reseller_session'));
        if (!session || !session.isLoggedIn) { window.location.href = "login.html"; }
    </script>
</head>
<body class="bg-[#0a0a0a] text-white p-6">
    <div class="max-w-2xl mx-auto">
        <nav class="flex justify-between items-center mb-10">
            <h1 class="text-xl font-black italic">STEO<span class="text-gray-500">TYPE</span></h1>
            <button onclick="localStorage.clear(); window.location.href='login.html';" 
                class="text-[9px] bg-red-500/10 text-red-400 px-3 py-1.5 rounded-lg font-bold border border-red-500/20">LOGOUT</button>
        </nav>

        <div class="bg-blue-600/10 border border-blue-500/20 p-6 rounded-[2rem] mb-8">
            <h2 class="font-bold">Halo, <span id="nm" class="text-blue-400"></span>! 👋</h2>
            <p class="text-[11px] text-gray-400 mt-1">Potongan diskon reseller: <span id="dsc" class="bg-white/10 px-2 py-0.5 rounded text-white font-bold"></span></p>
        </div>

        <div id="stokList" class="space-y-3">
            <div class="text-center py-20 text-gray-600 text-[10px] font-black uppercase tracking-widest animate-pulse">Memuat Katalog...</div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxM0LN44xzbUy4VDb8fVk_Olb3avz7m-AWlB_iKkDGprIjSayyaac4hBOlMYAznJGvB/exec";
        
        // Tampilkan profil & diskon
        const diskonRaw = String(session.diskon).toLowerCase();
        document.getElementById('nm').innerText = session.nama;
        document.getElementById('dsc').innerText = diskonRaw.includes('k') ? diskonRaw.toUpperCase() : "Rp " + parseInt(diskonRaw).toLocaleString('id-ID');

        async function loadStok() {
            const list = document.getElementById('stokList');
            try {
                const res = await fetch(`${API}?action=get_stok`);
                const data = await res.json();
                list.innerHTML = '';

                // Hitung angka diskon
                let dVal = diskonRaw.replace('k','');
                let dFix = diskonRaw.includes('k') ? parseInt(dVal)*1000 : parseInt(dVal);

                data.forEach(item => {
                    let hAsli = parseInt(String(item.harga).replace(/[^0-9]/g, '')) || 0;
                    let hFinal = hAsli - (dFix || 0);

                    list.innerHTML += `
                        <div class="bg-[#161616] border border-white/5 p-5 rounded-[1.5rem] flex justify-between items-center">
                            <div>
                                <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-1">${item.tahun_akun} | ${item.followers} Followers</p>
                                <h4 class="font-bold text-sm text-white">${item.username}</h4>
                                <p class="text-xs mt-2 font-bold text-white">Rp ${Math.max(0, hFinal).toLocaleString('id-ID')} 
                                    <span class="line-through opacity-20 ml-2 text-[10px] font-normal">Rp ${hAsli.toLocaleString('id-ID')}</span>
                                </p>
                            </div>
                            <span class="px-3 py-1.5 rounded-xl text-[9px] font-black uppercase ${String(item.status_stok).toLowerCase() === 'ready' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}">
                                ${item.status_stok}
                            </span>
                        </div>`;
                });
            } catch (e) {
                list.innerHTML = `<div class="text-center p-10 border border-red-500/10 rounded-3xl text-red-400 text-xs font-bold uppercase">Gagal Memuat Data Akun</div>`;
            }
        }
        loadStok();
    </script>
</body>
</html>
