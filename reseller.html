<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Reseller - SteoType</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // SATPAM: Cek Sesi dengan aman
        const getSession = () => {
            try {
                const s = localStorage.getItem('reseller_session');
                return s ? JSON.parse(s) : null;
            } catch (e) { return null; }
        };
        const session = getSession();
        if (!session || !session.isLoggedIn) { window.location.href = "login.html"; }
    </script>
</head>
<body class="bg-[#0a0a0a] text-white p-6 font-sans">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-xl font-bold italic tracking-tighter text-white">STEO<span class="text-gray-500">TYPE</span></h1>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 uppercase font-black tracking-widest mb-1" id="userDisplay"></p>
                <button onclick="localStorage.clear(); window.location.href='login.html';" 
                    class="text-[9px] bg-red-500/10 text-red-400 px-3 py-1.5 rounded-lg font-bold border border-red-500/20">
                    LOGOUT
                </button>
            </div>
        </div>

        <div class="bg-blue-500/10 border border-blue-500/20 p-6 rounded-3xl mb-8">
            <h2 class="font-bold text-lg text-white">Halo, <span id="nmDisplay"></span>!</h2>
            <p class="text-[11px] text-gray-400 mt-1">Harga otomatis didiskon sebesar <span id="dscDisplay" class="text-blue-400 font-bold"></span>.</p>
        </div>

        <div id="stokList" class="space-y-3">
            <div class="text-center py-12 text-gray-600 text-[10px] font-black uppercase tracking-[0.2em] animate-pulse">
                Menghubungkan ke API...
            </div>
        </div>
    </div>

    <script>
        // Mencegah error 'toLowerCase' dengan pengecekan bertahap
        const rawDiskon = (session && session.diskon) ? String(session.diskon).toLowerCase() : "0";
        
        document.getElementById('nmDisplay').innerText = session ? session.nama : "Reseller";
        document.getElementById('userDisplay').innerText = session ? session.nama : "Guest";
        document.getElementById('dscDisplay').innerText = rawDiskon.includes('k') 
            ? rawDiskon.toUpperCase() 
            : "Rp " + (parseInt(rawDiskon) || 0).toLocaleString('id-ID');

        async function loadStok() {
            const list = document.getElementById('stokList');
            try {
                // Mengambil data dari Cloudflare Functions /api/stok.js
                const res = await fetch("/api/stok");
                if (!res.ok) throw new Error("API Offline (Status: " + res.status + ")");
                
                const data = await res.json();
                if (!Array.isArray(data)) throw new Error("Format data salah.");

                list.innerHTML = '';

                // Hitung Diskon
                let dVal = rawDiskon.replace('k', '');
                let dFix = rawDiskon.includes('k') ? (parseInt(dVal) || 0) * 1000 : (parseInt(dVal) || 0);

                data.forEach(item => {
                    let hAsli = parseInt(item.harga.replace(/[^0-9]/g, '')) || 0;
                    let hFinal = hAsli - dFix;
                    if (hFinal < 0) hFinal = 0;

                    list.innerHTML += `
                        <div class="bg-[#161616] border border-white/5 p-5 rounded-3xl flex justify-between items-center group hover:border-blue-500/30 transition-all">
                            <div>
                                <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-1">${item.spek}</p>
                                <h4 class="font-bold text-sm text-white">${item.akun}</h4>
                                <p class="text-xs text-gray-500 mt-2">
                                    Rp ${hFinal.toLocaleString('id-ID')} 
                                    <span class="line-through opacity-20 ml-2 text-[10px]">Rp ${item.harga}</span>
                                </p>
                            </div>
                            <span class="px-3 py-1.5 rounded-xl text-[9px] font-black ${item.status.toLowerCase() === 'ready' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}">
                                ${item.status.toUpperCase()}
                            </span>
                        </div>`;
                });
            } catch (e) {
                list.innerHTML = `
                    <div class="bg-red-500/10 border border-red-500/20 p-8 rounded-3xl text-center">
                        <p class="text-red-400 text-xs font-bold uppercase mb-2 tracking-widest">Koneksi API Gagal</p>
                        <p class="text-white/40 text-[10px] mb-4">${e.message}</p>
                        <button onclick="location.reload()" class="bg-white/10 text-white text-[9px] px-5 py-2 rounded-full font-black uppercase">Coba Lagi</button>
                    </div>`;
            }
        }
        loadStok();
    </script>
</body>
</html>
